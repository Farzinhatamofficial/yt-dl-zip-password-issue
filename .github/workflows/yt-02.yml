name: 02- 💾 Large Youtube Videos Downloader (Fixed & Complete)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality (best, 1080, 720, 480, audio)'
        required: false
        default: 'best'
        type: string
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Start WARP Container
        run: |
          docker network create warp-net || true
          docker run -d --name warp --network warp-net -p 1080:1080 --cap-add NET_ADMIN caomingjun/warp
          sleep 20

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg p7zip-full curl jq bc
          pip3 install --upgrade yt-dlp

      - name: Download YouTube Video
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_MB=45
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))
          BACKUP_DIR="/tmp/video_backup_$$"
          mkdir -p "$BACKUP_DIR" videos tmp_downloads
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

          # FIX: QUALITY SELECTION (The main bug fix)
          # We remove [ext=mp4] constraints to allow 1080p/4K access.
          case "$QUALITY" in
            "audio") FORMAT="bestaudio/best" ;;
            "1080")  FORMAT="bestvideo[height<=1080]+bestaudio/best" ;;
            "720")   FORMAT="bestvideo[height<=720]+bestaudio/best" ;;
            "480")   FORMAT="bestvideo[height<=480]+bestaudio/best" ;;
            *)       FORMAT="bestvideo+bestaudio/best" ;;
          esac

          # Standardized download flags
          # --merge-output-format mp4 ensures the final result is always an MP4
          yt-dlp \
            --proxy "socks5://127.0.0.1:1080" \
            --format "$FORMAT" \
            --merge-output-format mp4 \
            --output "tmp_downloads/%(title)s.%(ext)s" \
            --no-playlist \
            --retries 10 \
            "$URL"

          # Sanitization and Processing
          sanitize_name() {
            echo "$1" | sed 's/ /-/g' | sed 's/[^a-zA-Z0-9-]//g' | tr -s '-'
          }

          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            BASENAME=$(basename "$FILE")
            FILENAME_NO_EXT=$(sanitize_name "${BASENAME%.*}")
            EXT="${BASENAME##*.}"
            SIZE=$(stat -c%s "$FILE")
            
            FINAL_FOLDER="$FILENAME_NO_EXT"
            TARGET_PATH="$BACKUP_DIR/$FINAL_FOLDER"
            mkdir -p "$TARGET_PATH"

            if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
              7z a -v${SPLIT_MB}m ${ZIP_PASSWORD:+-p"$ZIP_PASSWORD"} -mhe=on -mx=0 "$TARGET_PATH/$FINAL_FOLDER.7z" "$FILE"
            else
              cp "$FILE" "$TARGET_PATH/$FINAL_FOLDER.$EXT"
            fi
            
            # Create README
            echo "# $FINAL_FOLDER" > "$TARGET_PATH/README.md"
            echo "Quality: $QUALITY" >> "$TARGET_PATH/README.md"
            echo "Original URL: $URL" >> "$TARGET_PATH/README.md"
          done

      - name: Incremental Commit & Push
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          cp -r "$BACKUP_DIR"/* videos/
          
          # Master README Generation
          MASTER_README="videos/README.md"
          echo "# DOWNLOADED VIDEOS LIST" > "$MASTER_README"
          for d in videos/*/ ; do
            [ -d "$d" ] || continue
            NAME=$(basename "$d")
            echo "- 🎬 [$NAME]($NAME/)" >> "$MASTER_README"
          done

          git add videos/
          git commit -m "Upload Video: ${{ github.event.inputs.youtube_url }} [skip ci]" || exit 0
          
          # Robust Push
          MAX_RETRIES=5
          for ((i=1; i<=MAX_RETRIES; i++)); do
            git pull --rebase origin ${{ github.ref_name }}
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push successful"
              break
            else
              echo "Push failed, retry $i"
              sleep 5
            fi
          done
