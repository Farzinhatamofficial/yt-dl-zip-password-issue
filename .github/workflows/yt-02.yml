name: YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube URL'
        required: true
        type: string
      quality:
        description: 'Video quality'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      password:
        description: 'ZIP password (optional)'
        required: false
        default: ''
        type: string

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Start WARP
        run: |
          docker network create warp-net || true
          docker run -d --name warp --network warp-net -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp caomingjun/warp
          sleep 15
          for i in {1..5}; do
            if curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE "warp=(on|plus)"; then
              echo "WARP active"; break
            fi
            sleep 5
          done

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip3 install --upgrade yt-dlp

      - name: Download Video
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_MB=45
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))
          BACKUP_DIR="/tmp/video_backup_$$"
          mkdir -p "$BACKUP_DIR" videos tmp_downloads
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

          sanitize_name() { echo "$1" | sed 's/ /-/g' | sed 's/　/-/g' | tr -s '-'; }
          urlencode() { python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"; }

          case "$QUALITY" in
            "audio") FORMAT="bestaudio/bestaudio*" ;;
            "best") FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best" ;;
            "2160"|"4k") FORMAT="bestvideo[height=2160]+bestaudio/bestvideo[height<=2160]+bestaudio/bestvideo*+bestaudio*" ;;
            "1440"|"2k") FORMAT="bestvideo[height=1440]+bestaudio/bestvideo[height<=1440]+bestaudio/bestvideo*+bestaudio*" ;;
            "1080") FORMAT="bestvideo[height=1080]+bestaudio/bestvideo[height<=1080]+bestaudio/bestvideo*+bestaudio*" ;;
            "720") FORMAT="bestvideo[height=720]+bestaudio/bestvideo[height<=720]+bestaudio/bestvideo*+bestaudio*" ;;
            "480") FORMAT="bestvideo[height=480]+bestaudio/bestvideo[height<=480]+bestaudio/bestvideo*+bestaudio*" ;;
            *) FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best" ;;
          esac

          if [ "$QUALITY" = "audio" ]; then
            COMMON_FLAGS="--output tmp_downloads/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8"
          else
            COMMON_FLAGS="--merge-output-format mp4 --format-sort res --output tmp_downloads/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8"
          fi

          download_video() {
            case $1 in
              1) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno "$URL" ;;
              2) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=tv_embedded" "$URL" ;;
              3) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android_vr" "$URL" ;;
              4) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL" ;;
              5) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno "$URL" ;;
              6) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL" ;;
            esac
          }

          for METHOD in 1 2 3 4 5 6; do
            if download_video $METHOD; then echo "Success with method $METHOD"; break; fi
            sleep 3
          done

          find tmp_downloads -name "*.part" -delete
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            FILENAME_NO_EXT=$(sanitize_name "${BASENAME%.*}")
            EXT="${BASENAME##*.}"
            FINAL_FOLDER_NAME="$FILENAME_NO_EXT"
            mkdir -p "$BACKUP_DIR/${FINAL_FOLDER_NAME}"
            FOLDER_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}")

            if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
              cd "$(dirname "$FILE")"
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -s ${SPLIT_MB}m -P "${ZIP_PASSWORD}" -0 "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.zip" "$(basename "$FILE")"
              else
                zip -s ${SPLIT_MB}m -0 "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.zip" "$(basename "$FILE")"
              fi
              cd - > /dev/null
              PART_COUNT=$(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.z* 2>/dev/null | wc -l)
              TOTAL_SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)

              DOWNLOAD_LINKS=""
              NUM=0
              for part in $(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.z* 2>/dev/null | sort -V); do
                NUM=$((NUM + 1))
                PART_NAME=$(basename "$part")
                PART_ENC=$(urlencode "$PART_NAME")
                DOWNLOAD_LINKS="${DOWNLOAD_LINKS}| ${NUM} | ${PART_NAME} | [Download](https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/videos/${FOLDER_ENCODED}/${PART_ENC}) |\n"
              done

              cat > "$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md" << EOF
# ${FILENAME_NO_EXT}

| Property | Value |
|----------|-------|
| **Source** | [YouTube](${URL}) |
| **Size** | ${PART_COUNT} parts - ${TOTAL_SIZE_MB} MB |
| **Quality** | ${QUALITY} |
| **Password** | $([ -n "$ZIP_PASSWORD" ] && echo "YES" || echo "NO") |

## Download Links
| # | File | Link |
|---|------|------|
$(echo -e "$DOWNLOAD_LINKS")

## Extract
Download ALL parts to same folder, then extract the .zip file.
- **Windows/Mac**: Use 7-Zip or WinRAR
- **Linux**: \`7z x ${FINAL_FOLDER_NAME}.zip\`
- **Android**: Use RAR or ZArchiver app

*[avasam.ir](https://avasam.ir)*
EOF
            else
              if [ -n "$ZIP_PASSWORD" ]; then
                cd "$(dirname "$FILE")"
                zip -P "${ZIP_PASSWORD}" -0 "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.zip" "$(basename "$FILE")"
                cd - > /dev/null
                FILE_ENC=$(urlencode "${FINAL_FOLDER_NAME}.zip")
                FNAME="${FINAL_FOLDER_NAME}.zip"
              else
                cp "$FILE" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.${EXT}"
                FILE_ENC=$(urlencode "${FINAL_FOLDER_NAME}.${EXT}")
                FNAME="${FINAL_FOLDER_NAME}.${EXT}"
              fi
              SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)

              cat > "$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md" << EOF
# ${FILENAME_NO_EXT}

| Property | Value |
|----------|-------|
| **Source** | [YouTube](${URL}) |
| **Size** | ${SIZE_MB} MB |
| **Quality** | ${QUALITY} |
| **Password** | $([ -n "$ZIP_PASSWORD" ] && echo "YES" || echo "NO") |

## Download
| File | Link |
|------|------|
| ${FNAME} | [Download](https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/videos/${FOLDER_ENCODED}/${FILE_ENC}) |

*[avasam.ir](https://avasam.ir)*
EOF
            fi
          done
          rm -rf tmp_downloads

      - name: Stop WARP
        if: always()
        run: docker stop warp || true; docker rm warp || true

      - name: Push Files
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)

          urlencode() { python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"; }

          regenerate_readme() {
            echo "# Downloaded Videos" > videos/README.md
            echo "" >> videos/README.md
            NUM=0
            for folder in videos/*/; do
              [ -d "$folder" ] || continue
              FOLDER_NAME=$(basename "$folder")
              [ -f "$folder/README.md" ] || continue
              NUM=$((NUM + 1))
              FOLDER_ENC=$(urlencode "$FOLDER_NAME")
              echo "- ${NUM}. [${FOLDER_NAME}](https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/videos/${FOLDER_ENC})" >> videos/README.md
            done
          }

          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          mkdir -p videos
          cp -r "$BACKUP_DIR"/* videos/

          TOTAL_SIZE=$(du -sb videos 2>/dev/null | cut -f1)
          TOTAL_MB=$((TOTAL_SIZE / 1024 / 1024))

          if [ $TOTAL_MB -lt 100 ]; then
            git add -A videos/
            regenerate_readme
            git add videos/README.md
            git diff --cached --quiet || git commit -m "[AVASAM] YouTube download [skip ci]"
            for i in {1..10}; do
              timeout 300 git push origin HEAD:"$BRANCH" && break
              sleep $((3 + RANDOM % 7))
              git fetch origin "$BRANCH"; git reset --hard origin/"$BRANCH"
              mkdir -p videos; cp -r "$BACKUP_DIR"/* videos/
              git add -A videos/; regenerate_readme; git add videos/README.md
              git diff --cached --quiet || git commit -m "[AVASAM] YouTube download [skip ci]"
            done
          else
            for FILE in $(find videos -type f | sort); do
              git add "$FILE" 2>/dev/null || true
              git diff --cached --quiet && continue
              git commit -m "[AVASAM] Add $(basename $FILE) [skip ci]" --quiet
              for i in {1..5}; do
                timeout 120 git push origin HEAD:"$BRANCH" && break
                sleep $((2 + RANDOM % 5))
                git fetch origin "$BRANCH" --quiet; git reset --hard origin/"$BRANCH"
                mkdir -p videos; cp -r "$BACKUP_DIR"/* videos/
                git add "$FILE" 2>/dev/null || true
                git diff --cached --quiet || git commit -m "[AVASAM] Add $(basename $FILE) [skip ci]" --quiet
              done
            done
            regenerate_readme
            git add videos/README.md
            git diff --cached --quiet || git commit -m "[AVASAM] Update list [skip ci]"
            timeout 60 git push origin HEAD:"$BRANCH" || true
          fi
          echo "Done! - avasam.ir"
